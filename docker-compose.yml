services:
  web:
    build: .
    image: video-transcriber
    container_name: transcriber
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./queue:/app/queue
      - whisper-models:/root/.cache
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_LANG=${WHISPER_LANG:-ru}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
      - BASIC_AUTH_USER=${BASIC_AUTH_USER:-admin}
      - BASIC_AUTH_PASS=${BASIC_AUTH_PASS:-admin123}
    deploy:
      resources:
        limits:
          memory: 8g
    command: ["uvicorn", "upload-server:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "2"]

volumes:
  whisper-models:
